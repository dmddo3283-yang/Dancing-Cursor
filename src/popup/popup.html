<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mirrorball Cursor</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="panel">
      <header class="hero">
        <div class="brand-mark" aria-hidden="true"></div>
        <div class="brand-text">
          <p class="eyebrow">Sound-reactive cursor</p>
          <h1>Mirrorball Cursor</h1>
        </div>
        <div id="statusBadge" class="status-badge" data-state="idle">
          <span></span><b>OFF</b>
        </div>
      </header>

      <section class="power-zone">
        <button id="powerButton" class="power-button" type="button">
          <span class="power-icon" aria-hidden="true"></span>
          <strong>START</strong>
          <small>재생 소리 감지</small>
        </button>
        <div class="meter" aria-label="현재 감지 음량">
          <span></span><span></span><span></span><span></span><span></span>
          <span></span><span></span><span></span><span></span><span></span>
        </div>
        <p id="statusText" class="status-text">준비 완료 — 이 탭에서 음악을 틀어주세요.</p>
      </section>

      <section class="controls" aria-label="미러볼 설정">
        <div class="control-heading">
          <h2>Light mixer</h2>
          <span id="lightName">SHINE</span>
        </div>

        <label class="slider-row">
          <span><b>빛 강도</b><output id="intensityValue">65</output></span>
          <input id="intensity" type="range" min="1" max="100" value="65" />
          <small>은은하게</small><small>눈부시게</small>
        </label>

        <label class="slider-row">
          <span><b>감도</b><output id="sensitivityValue">55</output></span>
          <input id="sensitivity" type="range" min="1" max="100" value="55" />
          <small>둔감</small><small>민감</small>
        </label>

        <label class="slider-row last">
          <span><b>미러볼 크기</b><output id="sizeValue">60</output></span>
          <input id="size" type="range" min="1" max="100" value="60" />
          <small>작게</small><small>크게</small>
        </label>
      </section>

      <footer>
        <p><b>ON</b>이면 이 탭에서 재생되는 소리에 반응합니다. Dancing Chrome과 동시 사용 OK.</p>
        <p class="shortcut">켜기·끄기 단축키 <kbd>Alt</kbd><kbd>Shift</kbd><kbd>M</kbd></p>
      </footer>
    </main>
    <script type="module" src="popup.js"></script>
  </body>
</html>
